body:
  text: 第一章漢藥之概念一漢藥之種類自來一般人言及漢藥輒聯想及於草根木皮其實漢藥之種類不僅植物而已凡礦物性之物動物性之物所謂包羅萬象無不涵括其中而在生藥方面苟稍稍加以人工為用又自不同例如法半夏茅朮等藥簡單加工之藥也膽南星人中黃等以動植礦之各種生藥調合為復雜之製品者也又如米也麥也野菜也果蔬也甚至如器具也衣類也無不可製為藥物無不可以為藥用即調合之水煎煮之火亦無不含有深意與妙理吾人雖謂之地上諸物網羅在內亦無不宜此其原因不外乎經歷久遠之時代及各地方民間發見之效藥漸多調劑之技術漸精纍積而成漢藥雖包含種種物質而生藥方面確以植物性為多所以呼之為本草而神農本草經實為中國最古之藥物書籍此書曾於梁時經陶弘景校定收載藥品三百六十五種其中除重復者十八種外得三百四十七種大體分類如次從上表觀之植物性生藥較之動物礦物為多蓋自昔已然其後藥品種類漸次增加陶弘景於神農本草經之外更輯録漢晉名醫所用之藥品三百六十五種曰名醫別録至唐時依新修本草所載有八百五十種宋時開寶本草中有九百八十三種而嘉祐本草已達一千八百十二種證類本草達一千四百五十六種迄於明季李時珍之本草綱目竟至一千八百九十二種之多茲以本草綱目之內容分類觀之水部四三種火部一一種服器部七九種從上表觀之植物之增加比之動物礦物為多即植物性生藥亦依然占絶對之多數焉水部火部服器部等為神農本草經所無水與服器始自名醫別録而火部則自陳藏器之本草拾遺以後始發見云於此有宜補充一言者神農本草經之三百六十五種藥品中往往同一植物未分其子葉莖根同一動物未分其骨肉臟蹄後人以其效用各殊一一分離而記載之宜乎本草綱目有如斯繁多之藥品也自後乾隆年間趙學敏著本草綱目拾遺就本草綱目之漏載者依其藥效一一記載之亦得七百餘種漢藥之種數實可謂達於漠大之境矣二中國現在通用之藥如斯繁多之漢藥吾人可以斷然的決定其非同一時代概行使用而系網羅各時代各地方民間慣用之藥與夫傳説之藥即飢饉凶年備救荒之多數日用食品代用之品無不包括其中李時珍亦云雖有多數自身未見之物亦收載於本草綱目中即此一言可以喻其餘矣今日中國國藥店中實際日常使用之藥物亦依地方而異除地方的民間藥非普通藥店能備外大體不過五百種左右余曾就奉天營口祁州各代表藥店之藥名單及天津稅關之輸出入漢藥表調查其生藥之數則如下表從上表觀之可決定一國藥商店其生藥之種類大概在三百種左右其中十分之八為植物性藥品更就上列藥品之內各店共通所備之藥檢查之則得下列合併之表上表不過從華北方面之調查不能概例其餘因中國各藥店中所備之藥往往因時因地而有差異也惟上海北平廣東雲南等各藥店所備之藥種類甚能一致又上表所死四百餘種藥品之外尚有百種內外常觸於吾人之眼簾中則總得五百餘種矣茲再從前表揭其藥名如次一四店共通所備之藥品烏頭厚朴甘松烏藥香附菊花鬱金香薷枳實藿香莪朮枳殼廣皮遠志甘草羌活桂皮桂枝紅花樟腦當歸丹皮陳皮人參巴葉防己檳榔玄參鉤藤山藥青黛川芎黨參知母通草巴豆百合益智細辛山奶青皮前胡澤瀉竹茹薄荷白芷雷丸棗仁草果常山大黃丹參竹葉杜仲貝母白朮木瓜李仁牛膝蒼朮三漆秦艽大戟丁香肉桂防風木香良薑蜈蚣雄黃牛黃全蠍連翹鱉甲甘石黃蘗龜板輕粉黃芩殭蠶紅粉金銀花金石斛延胡索山楂子山茱萸川楝子木鱉子使君子肉豆蔻覆盆子胡黃連生地黃天南星馬錢子密蒙花吳茱萸小茴香麥門冬石連子膽南星巴戟天白豆蔻零香草羚羊角荔枝核二三店共通所備之藥品甘遂橘核枸杞桂子芡實烏梅乾薑橘紅藕節杏仁荊芥薑黃光茹柴胡桔梗沙參神麯獨活蓽茇粉葛沒藥樓仁皂刺砂米絲瓜川椒赤芍天麻乳香白果柏仁百部洋樟蓮鬚皂角射干蘇葉排草白芍扁豆洋參檀蓍川附蘇子檀香年健半夏棐子白芨犀角蒺藜女貞續斷地楓燈心白藥萆薢茯苓麻黃鹿茸麝香蟬退奎砂象皮蛤蚧水銀蟾酥珍珠靈脂地龍個砂月石烏蛇土蟲片砂青鹽罌粟殼叩米子荊三稜胡蘆巴叩仁子海金砂款冬花廣豆根五加皮穀精珠海桐皮茄楠香血竭花五味子孩兒茶金牛草苦楝皮牽牛子五倍子草豆蔻草決明川黃連青木香大楓子地骨皮白鮮皮馬兜鈴大腹皮佛手柑西紅花川朴花天花粉肉蓯蓉補骨脂山梔子熟地黃赤小豆天門冬母丁香萊蔔子節菖蒲千金子胖大海龍膽草蛇退皮石決明穿山甲海螵蛸冬蟲夏草三二店共通所備之藥品阿魏橘絡桂通紅葉蓮子紅娘石榴琥珀桃仁萎蕤訶子槐花白芥木通陸通昆布龍齒柿蒂柿霜信石竹瀝杏葉枸櫞陽草黃連龍骨芫花紫苑海馬砂仁地丁附子藁本玉竹桂楓連房黃蘗紫草蜂房膽礬升麻蘇梗甘漆桂碎蘆薈桑皮祁蛇斑蝥沉香何首烏糖瓜蔞天竹黃蔓荊子山豆根金錢蛇紫荊皮車前子陽起石迎春花紫豆蔻五穀蟲海浮石石菖蒲馬檳榔海風藤骨碎補寒水石青楓藤胡麻仁桑椹子小連子紅花餅紫草苴石楠藤蘇合膏青蒙石密陀僧洗冰片自然銅葶藶子金櫻子不食草四一店所備之藥品鶴蝨桔片薑皮葛花芥子茵陳艾葉海草瓜子海帶橘葉卷柏合歡苦果栝蔞鎖陽砂苑大白重樓呈茄柏葉鹿角龜膠樺皮辛夷澤蘭豬苓馬勃風藤蒲黃乾蟾狗脊神羔石韋大利毛根蕪荑木賊柚皮黃精鹿鞭棕片木鬥榆蘑蝟皮蜂蜜杞子榆皮鹿膠水蛭滑石水粉赭石紅礬石膏石燕石黃石蟹石蠍原砂髮菜安息香夏枯草淫羊藿銀柴胡苦丁香寄生葉郁李仁甲木頭葛仙米枳椇子巨性子牛蒡子萆麻子翻大麻野大黃老鴉草胡荽子松羅茶土茯苓薏苡仁凌霄花狗皮羔午時茶陳皮膠菟絲子桑螵蛸湖蓮子棗檳榔人中白冬葵子天葵子南藤香梅樹皮芙蓉葉山薑子人中黃大青葉楮實子天仙子雞內金鳳目草藥檳榔黑白絲金精石銀精石赤石脂陽起石白石脂金蒙石花蕊石王不留行五除上列各表外日常在各藥店中所見之藥品白蘞浮萍及己甘焦黃蠟石英薺苨韭子商陸萹蓄茺蔚白薇白前側柏青蒿蜀葵地榆益母貫衆瞿麥苦參漏盧緑豆蠡實蒼耳蕤核大薊小薊木槿蚤休蕺菜紫參胡桃芒硝龍眼罌子阿片阿膠黃菪狼毒蠶砂地筋玉簪王孫薤白坤草蘭草當藥牡蠣菴䕡豨蘞蟾酥橄欖葛根茜草馬齒莧地膚子白頭翁馬鞭草虎杖根狼把草馬蘭花白屈菜海人草蓽澄茄蒲公英龍涎香劉寄奴山慈姑急性子羊躑躅仙人掌天名精黃瓜皮硃砂根蟲白蠟金盞花鐘乳石百藥霜夜明砂望月砂青葙子無明異禹餘糧威靈仙蛇床子旋覆花大豆黃卷三漢藥之起源及其發達漢藥之應用於皇漢醫術其動機亦屬不一而多不出乎原始的任民之本能的治療之範圍而時代之民間藥亦當然包括其中其後因信仰巫術神仙服餌之品遂致與醫藥混淆自與西域交通於是印度波斯等外國藥品亦隨佛教而渡來加以從海洋方面之外來品復益以加工調治之經驗技術愈益進步深覺生藥之調合亦愈多實際使用愈形便利於是新增之品漸多繁復之品漸刪遂致有今日之盛故吾人可謂漢藥之發達不僅限於中國之醫學史而已實深有關於普遍的一般之東洋史焉醫學史之於中國在秦漢以前不易知其狀態就傳説言距今約五千年前黃河一帶本系苗族所居其時我漢民族從新疆甘肅沿河流東漸驅迫苗族而居住於黃河流域其後伏羲神農軒轅三皇各具蓋世之職明遺下三墳之書實為後世典籍之鼻祖炎帝神農著本草經為醫藥之世軒轅皇帝著素問靈樞為醫學之祖雖近世研究史學者疑本草與素問為後世之假託物而推定為漢代綜合大成之書然吾人可以斷言者三皇之後以漸離原始人類之野蠻生活脫去本能之治療區域而漸入於疾病藥物治療之境矣先秦時代可資為窺測醫藥狀態最重要之典籍者厥為山海經此書昔調傳系自禹之著作而據史學家之考證則謂此書決非一時代一個人之手所成而成自戰國時代者書中分中國為東南西北中五部記述各地山嶽河流地方物産與夫神之形狀及其祭祀之方法與藥物無甚關係但就其記述之物産項目中可以窺見醫藥狀態之一斑實甚有興味之書也書中所舉之物産關於動物者二百七十餘種礦物六十四種植物百五十餘種內中大部分為藥用品物據日本漢醫中尾博士之分類如下一關於食之效藥六十八種植物二十一種動物四十七種二關於佩或服之效藥二十九種植物十七種動物十種礦物二種三現吉凶之兆之物五十一種動物五十一種四有藥效或其他效用之物五十五種植物二十一種動物三十種礦物四種按周禮醫師有食醫疾醫瘍醫獸醫之別具見當時人對於養生之道甚為重視即如食物方面必依季節而規定食物之調理配合攸關於增進健康者甚大即有疾病則食物亦必有賴於專門醫師之指導後世本草書中記載極多之食物或稱食經或稱食物本草或稱食療本草等遂有以藥效為目的之食物專門醫者諒亦戰國時代食醫之遺風也其次所謂佩之服之者蓋如現代護符之用法帶某物質於身體或結之於衣服以能避病或能治疾之義也謂出現而有藥效者乃示當時畏懼自然物之迷信低劣也其次有藥效與有他效用之五十五種之中有藥效者三十三種其餘二十二種為防災害者也三十三種之有藥效者乃根據經驗認有一定藥效也自無何等醫藥知識之原始時代觀之頗見進步又防災害之藥品亦用自然物可見當時視種種災害亦與疾病同理由而致者也其次可注目者為山海經藥品中之動物性則比植物及礦物尤多陶弘景校定之神農本草經以及中國曆代本草書之植物性藥品斷然占其多數者如前所述也獨山海經之動物比植物尤多者諒為此書非藥物專門之書故也一面可見當時關於醫藥知識之如何幼稚如食之有效或出現而有效之類主為食餌療法或迷信的分子居多所致要之山海經中藥品之藥效一服單純不若後世所記藥品之對各方面有復雜作用也由是可以推想先秦時代之醫藥狀態多不出原始的範圍之外也其次擬就山海經出世之戰國時代所起神仙説之一言神仙之説本與中國之醫學雖無何等關係然其一樣處理藥品之點對後世之醫學及本草學遂有非常影響志在研究漢藥者應不可度外視之世傳漢武帝時代司馬遷所著史記謂神仙説起自齊威王西紀前三百七十九三百四十三年宣王西紀前三百四十二三百十四年及燕昭王西紀前三百十二二百七十九年之時代大概即西紀前三百五十年前左右也神仙説亦因時代而有種種及後代雖頗覆雜在起初則極簡單大概謂東方海中有蓬萊方丈瀛洲三仙山神仙居焉其處有不死之藥宮殿以金銀作之於是如何而後可到如何而後得求其不死之藥説仙而講究其法者是謂之方土原來中國自古有天國之思想如黃帝封禪既畢鼎成而天龍下降黃帝乘龍升天之説乃對此天國之憧憬自古傾心研究升天祕術者不乏其人其間而有神仙説亦非偶然關於三仙山之史記所載謂渤海方面常現蜃氣樓是為發生神仙説之直接動機又視此説之起於燕齊地方即今之山東省及河北省一部亦可以想像其一端在未開時代應不知蜃氣樓之何物故忽然出現於海中時或現於海水之下近之則隨風漂渺目擊此奇怪現象莫怪發生種種附會臆説何況升天難求之際轉不若眼前現實之或得易行於是考究種種工夫以圖得達此不可思議之境亦非無理也秦始皇信神仙説用方士之言造阿房宮一面遣徐福於蓬萊島以求不死之藥者有名之話柄也漢武帝西紀前一四八七年尤甚重用種種方士依其言而作種種愚魯之事結局方士之言不能實行遂有許多見殺者武帝一死人莫之言是以神仙説亦巧裝老實使人易欺然究竟不若武帝當時之盛至後四代之成帝時西紀前三七七年方士之勢力全然不及於宮庭然非以此而終熄也及魏晉南北朝以後混入道教與房術養生辟穀導引等之思想結合雖受時代之種種潮流究竟至今仍存其所謂神仙也道教也皆以輕身延年羽化登仙為主眼其手段終賴實在藥物之祕效為特色自葛洪陶弘景孫思邈等之醫學及本草方面觀之可見著名學者同時醉心道教亦非偶然又古來為醫經之祖所尊崇之靈樞素問之中亦確實多含道教思想故中國之醫學以及本草多有神仙或道教的要素者宜記之勿忘也四將來漢藥研究之進路其次擬就將來研究漢藥宜取如何方針言之至今日本産之生藥業績頗多一部藥學者甚至謂漢藥已無研究之餘地博物學的以及化學的藥理學的皆闡明至相當境域蓋自明治維新以後受幾多先輩科學者努力之賜自不待言而德川末期之日本本草家之功績亦不可忘也彼博物學上有偉大業績而後得維新後長足進步也反之在中國國土既非常廣汛且乏如日本德川時代之科學的素地是以全在五里霧中之狀然余於此所欲述者專為中國之生藥若他地方之生藥自屬別題也為研究中國之生藥即漢藥而大成之第一必須現行漢藥之知識即就中國現在所用各種漢藥知其産地明其學術上種名究其地方的異同是為先決問題日本當德川之世依本草家之非常努力日本産生藥之種名大見闡明然中國之生藥與日本之種不同殊如彼産而此不出此有而彼無所謂緣慳者代之者有之是乃不見實物單以不完全之中國本草書所載是賴自日本産者之中物色適合之類所致其博識與努力真有令人敬服者然未可以以此即充得中國品也近世歐美人之研究中國藥物或博物者不少此等與日本之本草家不同皆親歷中國各地接其實物故多可信用然其足迹猶難遍中國全土如此之研究實屬難中之難且屬根本的問題故擬徐徐以部分而漸進之其次為古今藥品異同之研究假令雖同一名稱而古代之藥品未必與今日之藥品同一種者視歷代本草書常有爭論亦可以明矣是以欲研究古代之治療法尤其是須從傷寒論等之古方以研究治療者當然要求關於此之知識也其次為自生藥中抽出有效成分及其藥理學的研究此乃至今所行也欲以現在的利用漢藥自然不可不過之關門然漢藥中大都作用緩慢間有不能發見特別有效成分者亦不少故如此之物雖經動物實驗自然不見明確效果是以其實驗方法亦自然不可不異宜就個個藥品研究其配劑進而復合藥理然關於配劑之研究所不可缺者為臨床的知見現在不論中國滿洲大多數皆依漢醫用漢藥聞日本近時亦有專用漢藥之醫家吾人如不另設研究機關以組織的研究之則學問之諒解不能多期進步也要之漢藥之研究極涉多方面非一二處研究所之所能盡者各研究機關固不待言又須網羅各方面之個人研究者保一定之統制互相提攜協力而後效果可期也第二章中國曆代本草之概觀本草兩字之出於典籍者當以班固之漢書郊祀志及樓護傳為最古故漢以前於方士之間是否有藥物專門之學術姑且勿論而對專攻藥物之學術稱為本草者自漢始也在本草擬述此本章發達之經過大要至若歷代本草書之書志學的考證只就本草為中心之歷史大概述之一漢時代漢遭王莽之變雖中斷十四年然自西紀前二六年至西紀後二二年之四百餘年間之大帝國也以武帝之雄略疆域擴大文物隆盛自醫學言之至今與原始時代無甚大差者及此時代漸見形成體系如本草一門至具備一個學問之形式者乃此後之事也不但醫學然凡百文物皆以漢為一機轉變而其影響於後代亦大即現今華人仍多以漢為國民的王朝自以為漢之後裔稱中國之醫學為漢方名其藥為漢藥指其文字為漢字是皆此王朝所遺也自本草方面觀之變化亦頗大藥品尤以植物性藥品非常增加蓋武帝西紀前一四前八七年南征北討領土非常擴張殊如廣東廣西至海南島今之法領東京亦屬其版圖至今所有者主為山西直隸山東河南等之北方寒帶之植物自此而南方熱帶之植物亦得收穫又武帝時之西紀前一二二年前後張騫奉使西域道出西藏中央亞細亞方面自攜至今中國所無之石榴胡桃胡瓜苜蓿蒜葫胡荽西瓜無花果等之種子而歸且以西域為介得悉西方諸國之事情與波斯墨蘇普答尼亞夫雅斯坦等開始交通又計畫自雲南通印度羅馬帝國亦於此時代被中國所知咸稱為大秦國如是海陸並進漸次輸入新植物一面盛行研究此等新來植物之用途於是醫藥之數大增加矣醫人則有張仲景華他等國手輩出就中張仲景為醫術之祖而受後世所尊然其傳記則無確實根據唯相傳後漢獻帝建安年中西紀一九六二二年曾為長沙太守其所著傷寒論及金匱要略至今猶為中國醫學之寶典尤以古方派醫家為然至於華他據其傳曰通五經養生之術百歲猶有壯容人以為仙其療病也不過合藥數種心解分劑不稱量目但便宜煮熟使飲之若病結積在內而針灸服藥等無靈時宜刳割外科手術之是乃飲以麻沸散麻醉劑而後切開患部除去病根若夫病根在腸則宜切開其腸而浣洗之云云此人後被曹操所招因不聽命故見殺歷史載曹操死於建安二十五年西紀二二年故華他約略當與仲景同時代之人也華他著有中藏經與仲景之傷寒及金匱同為醫藥之寶典即素問靈樞扁鵲之八十一難經仲景之傷寒論金匱要略華他之中藏經晉皇甫謐之甲乙經等皆為中國醫學之古典最有名者也今試讀傷寒論或中藏經令人第一即感其處方比宋元以後者甚單純後世每一處方而配合二三十種藥品者決非稀罕若漢代之處方多不過五六味此何以故耶蓋非必漢代學理淺薄因為後來形而上之理論增長藥品之配合費氣自然品數增加為此後來反愛簡潔之古方現在中國所存漢醫學之處方諒有數十萬其屬於漢代者實寥寥無幾至其藥品載在傷寒論者亦不過二百餘種耳其次擬就本草書一言中國本草書之最古者相傳為神農本草經此諒出於漢代者已如前述據劉向父子之七略所傳之漢書藝文志神農本草經固不待言連本草兩字之書亦未嘗載焉惟其內容有類於本草者只有經方中之湯液經法三二卷神農皇帝食禁七卷及神仙中諸雜子道然則班固作漢書之西紀九年前後之有稱本草之書與否實在疑問蓋劉向七略乃廣羅散佚之遺書於天下者若夫新梓之書則不為焉然或謂本草之書籍雖不在七略之中當時已出世矣侍醫李國柱所校之漢書藝文志方技略之由醫經經方房中神仙等四部而成尤以不列本草之綱目觀之可見縱有關於本草之專門學術當極幼雅及後漢末季即西紀二百年時已有神農本草經及關於本草之書亦有數種即華他弟子吳普所著之吳普本草現雖不傳太平御覽常引用之例如當歸之項曰當歸神農黃帝桐君扁鵲甘無毒岐伯雷公辛無毒李氏小溫或生羌胡地又細辛之項曰細辛一名小辛一名細辛神農黃帝雷公辛桐君小溫岐伯無毒李氏小寒如葵葉色赤色一根一葉相連三月八月採根云可見吳普時代諒已有神農黃帝岐伯桐君雷公扁鵲李當等之關於本草之書其時本草之學問約略獨立關於此之專門書亦諒有二三也二魏晉南北朝時代漢亡之後中國三分所謂蜀居四川魏北方吳江南鼎立稱雄歷史小説之三國志造成有名時代此乃始於西紀二二一年終於二六四年及西紀二六五年魏將司馬懿乘魏王無能強使退位而自立為武帝改國號曰晉其次西紀二八年吳降於是天下一統逮西紀三一七年北方被胸奴所迫遂遷都南京改稱東晉自是至西紀五八九年隋朝統一時約三百年中國四分五裂現出五胡十六國時代西東晉合之約連續一五年西紀二六五四一九年此間張華西紀約二八年著博物志東晉之葛洪西紀約三一七年著抱朴子郭璞著山海經爾雅等此等雖非醫藥之書然古文獻多引用之又有關於博物之紀載欲研究古代中國之文物皆貴重之文獻也自本草觀之亦屬貴重之材料也晉醫人有王叔和皇甫謐葛洪等皇甫謐以六十八歲死於武帝大康三年西紀二八二年其所著甲乙經自序之中有近代太醫令王叔和撰次仲景選論甚精云云之句故王叔和諒亦同時代之人也王叔和編撰張仲景之傷寒論金匱要略自以內經而著脈經開拓後世脈學之基礎皇甫謐家貧而苦學其所著甲乙經乃以靈樞為基礎為後代針灸之指南加入醫書五經之一葛洪好神仙導養之法著有神仙傳如陶弘景等之受其影響者不少自宋文帝西紀四二四年時代南北對峙胸奴及外藩建國於北方南方則宋齊梁陳等立國互有興替至於隋朝一統西紀五八九年普通稱此時代為南北朝此時代建國於北方之外藩遽受中國文化知佛教道教南方為漢民族之正統故此間文物之可觀者不少尤以後漢明帝西紀五八七五年時佛教公然入中國漸次培養南北朝時已大發展道教受此刺激亦成一種宗教之形式兩相發達矣於此不可忘者為前述陶弘景也此人於宋文帝元嘉二九年西紀四五二年生於今之江蘇省江寧府附近之丹陽梁武帝大同二年西紀五三六年以八十五歲死十歲時讀葛洪之神仙傳巳有養生之志云原來此人好道教又深信佛教曾於鄮縣阿育王塔受五大戒齊時為諸王太傅不與俗物交惟讀書研究故事齊武帝永明十年西紀四九二年辭祿而隱退於句容之句典山時四十一歲也其後遍訪名山採仙藥到潤谷則逍遙吟詠其精於本草也非單為典籍而來者或謂其本草以外凡陰陽五行風角星算山川地理方圖産物等無不通曉云而神農本草經乃此陶弘景校定者其序文曾引用於證類本草至今猶存讀之可以窺當時之狀態也其序曰隱居先生在乎茅山岩嶺之上以吐納餘暇頗遊意方技覽本草藥性以為盡聖人之心故撰而論之舊説皆稱神農本經余以為信中略軒轅以前文字未傳如六爻指垂畫象稼穡即事成迹至於藥性所主當以識識相因不爾何由得聞至於桐雷乃著在於編簡此書應與素問同類但後人多更修飾之爾秦皇不焚醫方卜術故猶得全録而遭漢獻遷移晉懷奔迸文籍焚靡千不遺一今之所存有此四卷是其本經所出郡縣乃後漢時制疑仲景元化等所記又有桐君採藥録説其花葉形色藥對四卷論其佐使相須魏晉以來吳普李當之等更復損益或五百九十五或四百四十一或三百十九或三品混糅冷熱舛錯草石不分蟲獸無辨且所主治互有得失醫家不能備見則識智有深淺今輒苞綜諸經研括煩省以神農本經三品合三百六十五為主又進名醫副品亦三百六十五合七百三十種精粗皆取無復遺落分別科條區畛物類兼注銘時用土地所出及仙經道術所須並此序録合為七捲雲云即陶弘景慨當時神農本草經之內容甚不統一醫家不便考究乃參照諸書於一定方式之下整理之為神農本草經之三百六十五品更撰漢晉以下諸名醫所用之神農本草經以外之藥品三百六十五種合為七百三十種解説序録為七卷然自敦煌發掘之唐開元六年九月十一日之神農本草經序録有前記序文之最後並記並此序録合為七卷云云或謂其七捲起初為三卷故弘景最初將神農本草經之本文與別録之本文共為三卷付梓其後加以注釋而成七捲雲然前記敦煌發掘之序録既屬七卷本唐之新修本草亦據七卷本而作故一般以七卷本為則若夫陶弘景校定以前之神農本草經張華郭璞葛洪等晉代諸家著書曾引用其斷片的記事差可窺其一部弘景校定本現在又無傳是以明之盧復清之孫星衍日本之森立之等雖圖改復原本結局是否真正照原本尚疑問也然證類本草依新修本草較得本來面目依此不但可知弘景校正本內容及體裁之大概本草發達之經路亦大約可窺也即據證類本草引用之處前述序文之次記有本草經卷上序藥性之源本論病名之形診題記品録詳覺施用本草經卷中玉石本草三品本草經卷下獸蟲果菜米食三品有名未用三品上三卷其中下二卷藥合七百三十種各別有目録並朱墨雜書並子注今大書分為七捲雲云其中者為白字諒所謂朱書之部分也即古本神農本草經之部分乃以朱書之別録以墨書之弘景自身之注則以細字分行書之此諒為七卷本之形式也此事據法人百里胡氏自敦煌持歸巴黎博物館之新修本草斷片可以明白但是古本本草經之文既經弘景取捨其後傳寫時有誤筆之處自不待言今日所遺證類本草之黑白二字之區別以何程度為正當要詳細研究之處也要之弘景校定之三卷本者起草關於藥物之總論的事項為第一卷第二卷分玉石草木之上中下三品第三卷又將蟲獸果菜谷及有名未用者分上中下三品者也其實此乃定中國本草學之基礎凡本草書至於李時珍之本草綱目皆具此形式殊如第一卷之部分不但可依此得窺上代漢藥之狀態爾後歷代本草家實際以為金科玉律而用之其次且就證類本草所存形式以窺其內容弘景校定本之第一卷部分收在證類本草第一卷每章第一以白字揭神農本草經之本文次載弘景之解説謂上本文如此今按云云一茲試舉順序讀之即第一以白字書曰上樂一百二十種為君養命為主以應天無毒雖多服久服亦不傷人欲輕身益氣不老延年者宜據上經中藥一百二十種為臣養性為主以應人無毒有毒斟酌得宜欲遏病補虛羸者宜據中經下藥一百二十種為佐使治病為主以應地不宜多服久服欲除寒熱邪氣破積聚愈疾者宜據下經等記載藥品之區別即上藥寧屬仙藥中藥為強壯藥下藥乃治療用之藥以現代式分類之恰如普通藥劇藥毒藥之區別也可見本草非自最初即記述純醫藥者神仙的藥品亦多數包含在內也其次記載藥有君臣佐使之別配劑宜以一君二臣三佐五使或一君三臣九佐使為旨此君臣佐使云者與現今處方學之主藥補藥矯味藥賦形藥等之區別同樣君藥乃指最適切有效於當前疾病之藥品與前記之上藥為君中藥為臣下藥為佐使之意全然不同也次論藥有陰陽之配合子母兄弟又有根莖花實苗皮骨肉等更述單行相須相使相畏相惡相反相殺之七情此七情即配合禁忌之説明也單行者單獨用之也相須者同類而不可離也相使者助我之能也相畏者受彼之制也相惡者奪我之能也相反者兩不相合也相殺者制彼之毒也是以宜用相須相使時則不可用相惡相反之物若用有毒之物時為抑制其毒則不可不用相畏相殺之物其次論藥有酸咸甘苦辛五味及寒熱溫涼四氣有毒無毒之別陰乾曝乾之別採取時期之別産地之異同新舊之差真偽之別等皆有法則次述用藥之法或宜為丸劑或散劑或宜水煎或須酒浸或煎成膏藥以一物宜取何法有不可入於湯酒者可見當時對藥性已有深刻之經驗矣其次論治療疾病不可不先究本源視其病機用毒藥時宜先自少量始又服藥之時刻謂病在胸膈以上者宜先飯而後藥病在心腹以下者則宜先藥而後飯病在四肢血脈者以空腹之朝為佳病在骨髓者則以飽食之夜為宜最後舉主要之大病四十餘種莫不溯其病源論其不可不恢復其變調於平等以上每項皆見陶弘景詳細解説可以知道當時醫學進步之狀態矣其次試舉中卷及下卷之記事一例於次以示其內容之大要獨活一名羌活一名羌青一名護羌使者味苦平生於川穀為風寒所擊治金創止痛能治賁豚病痙及女子之疝瘕久服之則身輕耐老上品由是觀之梁代本草之如何進步大略可以想見此時關於藥物之書籍甚多據七録所載而見引用於隋書經籍志者如次神農本草五卷神農本草屬物二卷蔡雍本草七卷華他弟子吳普本草六卷陶隱居本草十卷隨費本草九卷秦承祖本草六卷王季璞本草經三卷李當之本草經一卷談道術本草經一卷宋大將軍參軍徐叔向本草病源合藥要鈔五卷徐叔向等四家體療雜病本草要鈔十卷王末鈔小兒用藥本草二卷甘浚之癰疽耳眼本草要鈔九卷陶弘景本草經集注七卷趙贊本草經一卷本草經輕行一卷本草經利用一卷云麾將軍徐滔新集藥録四卷李當之藥録六卷藥法四十二卷藥律三卷藥性二卷藥對二卷藥目三卷神農採藥經二卷藥忌一卷此等在隋志謂其已失今日更無傳矣由此可見當時關於藥物學術之盛況也三隋及唐時代其次至隋西紀五九八六一七年始見中國再統一築起唐朝文化之礎此間不過二十八年醫人則有巢元方全元起楊上善等為中國醫學史上不可忘者也巢元方於大業年間西紀六五六一六年奉敕著病源候論此書之貴不劣於醫經五典為後代養成醫生所必要之教科書之一全元起寧以實際家出名為學究則著有素問注後代之素問皆據此全元起本也楊上善則於大業年間為太醫令著有黃帝內經太素之書此乃素問之注其形式雖與全元起本異內容則略同是亦研究古代醫學所不可缺之寶典也在本草方面則不見出名之人在隋書經籍志雖載有次記書名神農本草經八卷神農本草四卷雷公集注甄氏本草三卷桐君藥録三卷太清草木集要二卷陶隱居撰神農本草經三卷本草經四卷蔡英撰藥目要用二卷本草經略一卷本草二卷徐大山撰本草經類用三卷本草音義三卷姚景撰本草音義七卷甄立言撰本草集録二卷本草鈔四卷本草雜要訣一卷本草要方三卷甘浚之撰依本草録藥性三卷録一卷靈秀本草圖六卷原平仲撰芝草圖一卷入林採藥法二卷太常採藥時月二卷四時採藥及合目録四卷藥録二卷李密撰諸藥異名八卷沙門行矩撰本十卷今闕諸藥要性二卷種植藥法一卷種神芝一卷似乎用弘景枝正之神農本草經為本草正典其本草音義本草圖採藥法種藥法等之出現確為本草研究上不少興味之點也其次為唐唐為西紀六一八九七年間之漢民族帝國五千年之中國歷史中文化最盛殊如文學則巨星輩出其光芒可比歐洲胡瓦斯答斯時代於種種意味可以比於七世紀前漢民族所建之漢朝也此時代之著名醫家甚多其人與著書傳不朽之名者確為千金方著者孫思邈外臺祕要著者王燾內經著者王冰等孫思邈者奇人也傳為死於永淳元年西紀六八二年太宗當時西紀六二七六四九年已有百餘歲矣且自謂生於周帝辛酉歲若生於梁之辛酉大同七年西紀五四一年則當算一百四十二歲然周為陳武帝永定元年西紀五五七年之國號自大同七年算之當屬十六年後之事且周之時代為西紀五五七年五八二年之二五年間此間無辛酉之歲故孫思邈謂生於周帝辛酉歲之事或其間有誤是以此人曾活至幾歲亦不明然相傳唐代鄉人皆活至數百歲又談論後周之事頗詳或編齊梁陳周隋五代史為恐遺漏曾屢請教於孫思邈此人極信神仙後來稱之曰孫真人真人者得神仙道之敬詞也然又好佛教其所著千金方自然受佛教影響混有當時印度醫學之思想王燾乃云玄宗天寶西紀七四二七五五年時代之人本為官吏為欲愈母病而學醫其所著外臺祕要與千金方同為唐時代之代表的醫書同時被古文獻引用尊重至今王冰乃肅宗寶應元年西紀七六二年之太僕令今日之素問乃據此人所注也此人依全元起本注釋時正其文字章句之錯雜簡脫改其篇目如序文所示也或謂有紊素問舊態然當時素問亂雜無統王冰欲傳上古之思想於後世努力整理令人可敬幸而林憶等校正之宋本每篇之下記有全元起本之卷數可以窺得王冰以前書之大要也此期之本草書第一可學者為新修本草此乃蘇敬等二十二名受高宗之敕而編輯者本文目録共二十一卷藥圖十六卷圖經七卷計四十四卷成於顯慶四年西紀六五九年此書在中國自古無傳日本則自顯慶四年起七十二年後之聖武天皇天平三年曾筆寫焉其中只存三四五十二十三十四十五十七十八十九二十各卷依此可以想像原本之狀態然現存本皆為墨書在巴黎之敦煌發掘之新修本草斷片確有朱書雜焉大體依陶弘景校定之神農本草經之舊態以細字注曰謹案云云證類本草卷一之唐本注揭載今以序為一卷例為一卷玉石三品為三卷草三品為六卷木三品為三卷禽獸為一卷蟲魚為一卷果為一卷菜為一卷米穀為一卷有名未用為一卷合二十卷其十八卷中藥合八百五十種三百六十一種本經一百八十一種別録一百一十五種新附一百九十三種有名未用等依此可以略推本文二十卷之內容也此時附藥圖及圖經一事實一大進步苟此書現存為研究古藥當非常便宜可惜散佚無存至若食療本草乃孟詵所著孟詵為開元初西紀七一三年之人好方術師事孫思邈長生至九十餘歲晚年元氣凌駕壯者起初稱此書為補養方開元中張鼎改訂之而改稱食療本草依此雖得知周禮之食醫遺風然唐代養生家對食物非常關心視孫思邈所著之千金食治可以想見此書最初恐亦如題名所示以補養為目的者也其次開元二十七年西紀七三九年出世之陳藏器本草拾遺十卷乃收載神農本草經及新修本草所遺漏者不但傳古代之藥品記述大抵正確為後代所貴重此書在今日亦無傳焉此外雖謂更有甄權之藥性本草李珣之海藥本草蕭炳之四聲本草楊損之之刪繁本草李含光甄立言殷子嚴等之本草音義杜善方之本草性事類鄭虔之胡本草等書皆散佚無傳無由稽考也四五代及宋時代唐終西紀九七年宋始西紀九六年之五十餘年之間後梁後唐後晉後漢後周等小國互有出沒是謂之五代然其勢力微微自則天武后之季契丹猖獗與後梁同時分別建國西紀九三七年以後改國號曰遼至於西紀一一二四年約二百年間及一一一四年女真勃興建國曰金遼遂被亡焉其後金漸迫宋一一二七年宋遂退避南方於是南北對峙一二五年蒙古勃興一二三四年遂滅金而代之一二七九年更滅南宋而統一中國改國號曰元元至一三六八年被明太祖所滅時其間支配全中國凡一九年宋自西紀九六年太祖趙匡胤滅後周建國至南遷凡一六八年自南遷至西紀一二七九年被元所滅凡一五二年前後計三二年金則自西紀一一一四年建國至一二三四年被蒙古所滅其間凡一二年如此有力之國家代代兩立抗爭軍事雖多忙然宋為華人之正統繼唐之文化幾多碩學輩出一時殷盛可比漢唐是以外藩之金元自然受其影響此時醫界亦見大醫輩出開後世派之宗先自宋代醫人言之有錢乙龐安時朱肱許叔微陳言陳自明嚴用和劉溫舒韓祇和楊介錢聞禮史載之董汲陳師文楊士瀛等多士濟濟著書則有劉溫舒之運氣論奧朱肱之南陽活人書沈括及蘇軾之蘇沈良方王貺之全生指迷方許叔微之本事方陳師文等之和劑局方吳彥夔之傳言適用方嚴用和之濟生方陳言之三因方陳自明之婦人大全良方錢乙之嬰孩論陳直之養老奉親書等至今所傳為醫界活用之名著不少又徽宗政和中西紀一一一一年一一一七年新出之聖濟總録二百卷乃敕命天下名醫纂録府內珍藏之禁方祕論而大成者不但為中國最初之醫學大叢書且為研究漢方醫學所不可缺之好材料徽宗以外之歷代宋帝亦多致力於文化方面素問靈樞等古醫書之校刊者至再讀玉海所記天聖四年十月十二日乙酉命集賢校理朝宗慤王舉正校定黃帝內經素問難經巢氏元方病源候論唐志五十卷五年四月乙未命國子監摹印頒行詔學士宋口撰病源序景祐二年七月庚子命丁度等校正素問嘉祐二年八月辛酉置校正醫書局於編輯院命掌禹錫等五人從韓琦之言也琦言靈樞太素甲乙經廣濟千金外臺祕要方之類多訛舛本草編載有尚有所亡於是選官校正政和八年四月二十四日詔刊正內經重和元年十一月十五日詔以內經考其常以天元玉册極其變之文亦可以想見此事於傳古代書物至今之點亦有重大意義也其次如就本草言之宋代之本草為以前之本草即以神農本草新修本草之校定為主換言之即古傳本草書業已疊次增補改訂者也第一蜀本草乃後蜀孟昶時翰林學士韓保升與諸醫師以新修本草為基礎而編述者一稱廣英公本草後蜀乃後唐閔帝應順元年西紀九三四年時以蜀王孟知祥稱帝始其年七月知祥歿後昶繼之昶於宋乾德三年西紀九六六年降於太祖本書諒亦成於此二十二年之間也在本草綱目雖別記有圖經二十卷現今不傳惟證類本草引用之處得窺其本文耳總之本書於神農本草經及新修本草之次可以看做繼承第三位正統之本草書也其次為開寶本草此有二種一為崇文總目及通志藝文略所記之盧多遜撰新詳定本草二十卷宋志則記盧多遜詳定本草二十卷目録一卷一為祟文總目及通志藝文略所記之李昉等撰開寶重訂神農本草二十一卷宋志則記開寶本草本草綱目乃宋太祖開寶六年西紀九七三年命尚藥奉御劉翰道士馬志等九人參照唐蜀本草及陳藏器之拾遺等諸書而刊正者增加藥品一百三十三種馬志注解之翰林學士盧多遜等刊正之越七年馬志等再奉詔重訂學士李昉等校正之玉海但記開寶中命醫士劉翰道士馬志等詳定附益一百二十三種學士多遜昉蒙刊定之六年四月癸丑知制誥王祐等上之二十卷凡神農所説以白字別之名醫所傳墨字別之崇文目二十一卷御製序合九百八十三種並目二十二卷頒天下至於二種之區別則無記載焉然自開寶六年至八十七年後之仁宗嘉祐五年所出嘉祐本草序文有國朝開寶中兩詔醫士劉翰道士馬志等相與撰集又取醫家嘗用有效者一百三十三種而附益之仍命翰林學士盧多遜李昉王祐扈蒙等重為刋定乃有詳定之目並鏤板摹行之句似乎兩本並刊也此開寶重定之序文曾見引用於證類本草據謂自新修本草出業經四百年朱墨之別以及新舊注之別皆亂雜目的似為整理此等而作定本此書在今日亦不傳焉其次為嘉祐補注本草其序存在證類本草之中其中記有嘉祐二年西紀一五七年掌禹錫林億蘇頌等奉仁宗詔而加以校正云云此書於嘉祐五年八月成就奉上其目的為開寶重定本草已古宜重新刊梓改訂版諸家之醫書藥譜固不待言即民間藥之有著效者亦收載之雖經史百家之書苟有關於藥品之記事無不搜集之其體裁則以開寶重定本草為本循舊例朱墨雜書所引之書每條先以朱書臣禹錫等謹按某書別條分項時則其末附記見某書其引用書以唐本及蜀本為先他書則依著作之先後以陶弘景書而增者謂之名醫別録附其注於末以唐本增者為唐本先附以開寶重定本草增者為今附新增加者為新補各記於條末又當時有法而諸書所無者經太醫衆議別立條項為新定而注之在舊注之陶弘景注者為陶隱居云唐本者為唐本注云開寶之注為今注考據開寶傳記者為今按今詳或按等各朱書於首如此將神農本草經三百六十種別録一百八十二種唐本先附一百十四種今附一百三十三種有名未用一百九十四種新補八十二種新定十七種合計一千八十二種收載於二十卷其篇首附以陶弘景新修本草開寶重定本草三序其形式大略照開寶重定本草概存於證類本草故可於此窺得古本草之形式也李時珍評此書曰雖有校修無甚發明然本書之目的以其發明寧在保存其得保舊態者實研究本草者之幸也比嘉祐補注本草遲一年而出者為圖經本草現在之證類本草有嘉祐六年九月蘇頌之序據謂唐永徽中於新修本草之外雖有藥圖及圖經又有明皇御製之天寶單方藥圖頗便於藥物之考查然二書已散佚鴻都祕府亦無其書漢存天寶方書一卷乃命儒臣使編成補注本草一面下詔天下命各郡縣獻所産藥品之圖仿永徽故事以編述圖經然天下所獻之圖雖以千數其説明則詳略不定且多鄙俚如不專一整比以文修飾之不成體統掌禹錫為此奏請焉結局以蘇頌當編纂之任是以嘉祐本草之編者為掌禹錫圖經本草乃蘇頌所編究竟恰如新修本草與其藥圖及圖經之關係然兩者宜看作合為一部之書也此書亦不見完本傳世惟其文則概為證類本草引用大都就實物記述故為考究古代藥品者所不可逸也其次哲宗元祐七年西紀一九二年四川陳子承著一重廣補注神農本草圖經二十三卷證類本草曾録此書中林希之序據此可見嘉祐本草及圖經雖成世醫多未之讀不見廣傳陳子承合兩者為一又加古今之論説及自己見聞者也然此書現在亦不傳故其形式不明也李時珍於本草綱目之歷代諸家本草紀中曾列本草別説之名而記之曰宋哲宗元祐中閬中醫士陳承將本草及圖經兩書合為一間綴數語謂之別説高宗紹興末命醫官王繼先等校正本草亦有新附皆淺俚不見高論云此乃指陳子承之本草與王繼先等之校正本皆無高論諒非王繼先校正陳子承之本草也淺俚無高論之名乃直齋書録解題載紹興校定本草者李時珍因見陳子承本或紹興本而言與否不明也其次為證類木草此書本為四川唐慎微私撰大觀二年西紀一一八年十月朔日艾晟之序文曰慎微因見聞得至博採於本草圖經之外得備載數百種藥益以諸家方書及經子傳記佛書道藏凡該明物品之功用各附本藥其書三十一卷目録一卷約六十餘萬言名曰經史證類備急本草然此書不廣傳集賢孫公得其本而嘉之邦計之暇命官校正募工鏤板以廣傳之蓋所以有大觀本草之句諒為此也又政和六年西紀一一一六年命曹孝忠等校正此書刊行之名曰政和新修經史證類備用本草即後日政和本草之原本也此書為古代本草書形式之最後者首列神農本草以下至圖經本草之歷代本草之文次以墨蓋子區別之以下録慎微續添之諸家方書等文此書歷宋金元明而疊見重訂改版現在所傳者約有二種一為大觀本草一為政和本草關於此四庫目略載宋朝刻者曰大觀本草金朝刻者曰政和本草云云諒事實也中尾萬三博士考證結果所論亦同又明朝諸版及據此之現行本大抵以別説附加本草衍義之文於各藥之末別説云者乃陳子承重廣補注神農本草中子承所附之別説也關於此證類本草卷三之丹砂之末曾記晟近得武林陳承編次本草圖經本參對陳於圖經外又以別説附著於後其言皆可稽擴不妄因增入之云云云可見此乃大觀二年官版時所加者明矣又李時珍以此別説為無高論亦未必當本草衍義及成於政和六年之書也然現在政和本草之金之泰和甲子四年西紀一二四年晦明軒版印記有增以寇氏衍義故或謂諒自此始加於證類本草政和本草云又明萬曆五年梅守德序文之大觀本草亦附有本草衍義然此大觀本草諒加於元朝大德本或明朝萬曆本者也不論其何其附加之形式善與政和本草一致不知何時政和本仿大觀本或大觀本仿政和本關於此之考證請割愛焉總之本書為研究本草者之無二寶典也其次本草衍義乃政和六年寇宗奭所上之書為補助嘉祐本草及圖經本草之目的而作者其分類亦從之本文二十卷及目録一卷其中起初三卷為序例此書費了十餘年工夫而後成而又所載不虛故見重以上之外又有日華子諸家本草者此雖現在無傳在政和本草序例中之補注所引書傳記載曰國初開寶中明人撰姓氏不著但稱日華氏大明序集諸家本草近世所用之藥各以寒溫性味華實蟲獸為類論其近用功狀甚悉凡三十卷云又其文屢見引用於證類本草之中如前所述宋代有力本草多出於敕撰一面可謂中國本草學於此時達至頂點不但本草即關於醫學一般亦見用心致力者已如前述矣實際在治療方面亦於神宗元豐年間西紀一七八一八五年命天下名醫獻其得效祕方使太醫局試驗製藥徽宗之大觀年間則使陳師文作和劑局方此書與代表宋代病理學説之三因方同為宋代藥方之代表廣為後世尊祟者亦可見宋代醫藥之盛矣五金及元時代金元皆外夷以其勇猛武力得入主中國後漸受中國文化之影響而被同化遂忘了本來面目勇武致啓亡國之端然支配者雖屬外夷被支配者則為多數之漢人且受宋代學術之感化如醫學一門幾多大家碩學輩出遂現出金元醫學新紀元時代第一醫人則金朝有張元素字潔古劉完素號河間張從正字子和李杲號東垣成無己羅知悌等元朝則有朱震亨號丹溪王好古號海藏羅天益葛乾孫滑壽等醫書則有張元素之潔古珍珠囊病機氣宜保命集劉完素之素問玄機原病式宣明論方李杲之蘭室祕藏辨惑論脾胃論用藥法象張從正之儒門事親成無己之傷寒論淺注解明理論羅天益之衛生寶鑑王好古之湯液本草醫壘元戎此事難知朱震亨之金匱鉤元脈訣指掌局方發輝格致餘論丹溪心法滑壽之十四經發揮難經本義危亦林之世醫得效方葛乾孫之十藥神書等出名者不少此時代之本草專用證類本草故屢見重刊首為明之成化本及嘉靖本等之政和本草之證類本草所出經史方書之次有泰和甲子西紀一二四年晦明軒之版印取前述證類本草之善本增以本草衍義別本中方論多者悉補入之又本經別録先附分條之數多而有差者則考正之藥有異名者則取其俗稱而注於目録條下圖像失真者則據曾見者而更寫之升斗疽疸上下千十未末等之字畫誤謬者訂正之可見此時大校正而後刊行也其次同為政和本草有麻革信之序文及劉祁之跋文張惠存刊行之其刊行年代白井博士以元定宗四年西紀一二四九年中尾博士則以為元至大二年西紀一三九年大約以定宗四年為是總之此時曾一度刊行也其次大觀本草有明朝萬曆丁酉梅守德之序及艾晟之序其終末附記大德壬寅孟春宗文書院刊行之字當為元大德六年西紀一三二年亦見刊行也如斯可見金元之間至少亦曾刊行三次此時代重視證類本草亦可見其餘不見有著述可以匹敵之本草書本草綱目之歷代諸家本草中雖列舉張元素之潔古珍珠囊李杲之用藥法象王好古之湯液本草吳瑞之日用本草胡仕可之本草歌括朱震亨之本草衍義補遺等皆不足認為正統本草書利用價值亦極少詳細考證請暫割愛要之此期之醫學思想乃受宋儒性理説之影響以人身為一小天地依五運六氣如天地萬物之運行然人身亦依五運六氣以營生活現象四時寒暑之過不及即影響於人體發生疾苦故治療亦不可不隨應其過不及是以藥理頗繁雜多端各藥品皆配以氣味欲使該當獨特之陰陽病理説藥效之説明亦似乎煩瑣難耐爾來此思想至於近世影響頗大故凡欲覺金以降之藥方書者不可不置此事於念頭與經驗為據之古來藥理學説區別之也六明時代明朝乃自西紀一三六七一六六一年之二百九十四年間以漢人完全支配中國世既升平學術技藝大興然自大局觀之概為前時代即宋及金元文化之傳承醫學方面亦受金元醫學之潤色惟其內容頗至豐富之程度耳例如繆希雍方有執等為劉完素之流亞吳又可乃張從正薛鐙薛己父子張介賓趙獻可等乃李杲戴原禮徐用誠劉純等乃朱震亨各汲其流而繼其風又倪維值王肯堂等則各立折衷學派為學術之醫學頗見隆盛是以出名之醫書傳至今日者甚夥就中如徐春甫之古今醫統大全王肯堂之證治準繩吳勉學之古今醫統正脈全書等儼然醫學叢書或醫學百科全書之著述比比皆然者應可注目之點也茲為省煩故出名之醫家及醫書姑不枚舉焉若自本草言之方歷十八年李時珍所出本草綱目至於廣行一般時依然用證類本草政和本草重刊四次即成化四年西紀一四六八年嘉靖二年西紀一五二三年嘉靖三十一年西紀一五五二年隆慶三年西紀一五六九年大觀本草重刊兩次即萬曆五年西紀一五七七年萬曆三十八年西紀一六一年如斯之證類本草為宋以來之正統本草書流行至於明末至是乃見完成大著以替之即李時珍之本草綱目是也此書大體以證類本草為基礎其他參醫書二百七十六部經史百家四百四十部增藥三百七十四種總計一千八百九十二種皆分釋名氣味主治修治發明正誤附方等之項目纂輯歷代諸家之説以自己見識判定之編成五十二卷至今仍代證類本草為本草正統書廣被珍重且空前絶後云然如此之大著欲求完全實不可能及後發見李時珍見解多誤之點姑且勿論其考究古代藥品之法遺憾之點亦不少即此書以前所述因為記事分釋名以下七項致尚留於證類本草之古本草書形式全然破壞是以古文獻之記事亦失統緒而且省略其文章或改寫為文獻全不能引用之點最可遺憾所以令人疑其學術的價值而高唱證類本草宜保存者也此書成於萬曆十八年西紀一五九年萬曆二十四年時珍之子李建元付梓焉後萬曆三十一年刊第二版祟禎十三年西紀一六四年又刊第三版前記之外明代所著之本草書尚多然其內容皆不及本草綱目於此但舉其主要者於次而已本草發揮三卷徐彥純救荒本草四卷周定王庚辛玉册二卷寧獻王本草集要八卷王倫食物本草二卷汪穎食鑑本草一卷寧原本草會編二十卷汪機本草蒙筌十二卷陳嘉謨本草經疏十卷繆希雍本草元通二卷李中梓本草約言四卷薛己本草匯言二十卷倪純宇七清時代清於西紀一六一六年萬曆四十四年興於滿洲一六六二年遂滅明至於一九一二年民國革命計二百九十七年間為滿洲人之天下此間康熙乾隆盛時文化大興在醫學方面亦有幾多碩學出現其學説甚多端然大體屬金元醫學之流亞例如喻昌柯琴張志聰高士栻徐大椿陳念祖黃元御等為守舊派葉桂薛雪余師愚吳瑭王士雄等為改革派要之大都但鬥學説上之空理空論不若日本德川時代醫學者之真摯態度惟此時代儒者之間受考證學勃興之影響鴻儒實行古醫書之考證復原尤以嘉慶道光以後輸入西洋醫學中國醫學大起衝動者諒為不可看過之特徵也是以醫書亦於醫宗金鑑以外多數之叢書續出單行本則有不勝枚舉者其間於咸豐同治間來廣東之英人合信有西醫略論內科新説婦嬰新説全體新論等咸豐四年西紀一八五四年來廣東開博濟醫局之美國人嘉約翰有體質窮源內科全書西醫略解眼科撮要婦科精蘊花柳指迷皮膚新篇衛生要旨又光緒年間趙元益譯英人海得蘭所著之儒門醫學內科理法西藥大成等莫不有相當廣泛讀者其次本草方面則仍廣用本草綱目者自不待言如順治十二年西紀一六五五年之吳氏本同十四年張氏本等數見刊行本草綱目以外之本草書上梓者甚多如概括的説明之清朝本草書大體有二潮流一為實用本位即以為本草綱目之記述太復雜實際醫家不便日常使用自然要求簡單要約之本草書如汪昂之本草備要即為此目的也在中國固不待言即日本亦甚歡迎更別有一潮流為藥理之解説元來藥品之氣味自古已論之尤以明朝繆希雍之論頗詳此風潮至清朝而最顯然但是其論旨不外乎以陰陽之思想而論氣味自現代藥理學觀之相去大有徑庭此期本草書之主要者如次本草備要四卷汪昂本草原始十二卷李中立本草述三十二卷劉若金本草匯十八卷郭佩蘭食鑑本草二卷尤乘藥品辨疑二卷尤乘食物本草會纂十二卷沈李龍本經逢源四卷張璐神農本草經百種録一卷徐大椿本草詩箋十卷朱倫長沙藥解四卷黃元御玉楸藥解八卷黃元御本草從新十八卷吳儀洛本草綱目拾遺十卷趙學敏本草崇原三卷張志聰本草求真十一卷黃宮繡要藥分劑十卷沈金鰲神農本草經三卷孫星衍復原神農本草經讀四卷陳念祖本草經疏輯要十卷吳世鎧本草述鉤元三十二卷楊時泰草藥圖經一卷懷庭本草疏證十二卷鄒澍本草續疏六卷鄒澍本草序疏要八卷鄒澍本草分經一卷姚瀾植物名實圖考三十八卷吳其浚浚植物名實圖考長編二十二卷吳其浚神農本草經贊三卷葉志詵本草三家合注六卷郭汝聰本經彙纂十卷屠道和本經便讀一卷黃鈺藥要便蒙新編二卷鋆問渠本草便讀二卷張秉成本草問答二卷唐宗海本草述録六卷張琦得宜本草一卷王子接本草話二十二卷趙學敏本草主治二卷黃宮繡本草新編五卷陳士鐸本草匯箋十卷顧元交本草洞詮二十卷沈穆此外不但有關係於本草之書多數在醫書中論本草者亦不少故清代之本草關係書實有汗牛充棟之概然大都歸屬於前述二種類之一故於上列記諸書之中試舉研究漢藥所必不可缺者當為趙學敏之本草綱目拾遺與吳其浚之植物名實圖考綱目拾遺如其名所示乃集本草綱目所遺漏之藥品引用諸家之説仿綱目之例而編纂者其體裁內容雖皆不及綱目本為拾遺逸之目的到底難望過此以上者然增加較新之藥品多數又補入明清諸家之説凡研究本草者必須備一本也名實圖考則於著者死後二年即道光二十八年始由雲南省蒙自之陸應谷校刊圖考三十八卷長編二十二卷長編乃引本草經及古今諸家之説處處插入自説圖考則附精密之圖記植物學的之事其所載植物在長編八百三十八種在圖考一千七百一十四種著者為嘉慶進士歷任各地其官迹半天下親覽各地事物故其所説的確即現在亦為研究中國植物之唯一指針之名著也現時舊版頗難入手唯上海商務印書館曾發行洋裝活字本其圖版亦見縮刷無如到底難睹舊版面目然亦屬研究者座右不可缺之書也又清朝時代所出之書如廣群芳譜之類書農書花譜府縣志等可為研究中國藥品之參考書者不少可惜紙面有限無遑細述為憾第三章和漢藥與新藥漢武帝徵伏三韓移文物於是地日本起初自三韓次及隋唐之世直接移入醫學醫藥致古來醫學受非常影響日本醫學化為漢方對古來醫藥加之以移入之漢藥又發見土産醫藥於是醫藥成立一種系統所謂和漢藥或皇漢醫藥遂見知矣其後在日本幾多碩學輩出漢方醫術之研究亦盛在醫藥方面頗見進步自本草言之其研究主定日産某種藥以當漢藥某種因漢藥大部分為植物性故植物之形態學多加研究大有貢獻於本草學之進步固不待言而裨益於植物學的研究上亦甚大自後西洋人調查東洋方面之植物時依此得非常利便者有之及德川末期輸入西洋醫學之後研究者愈衆至明治維新政府斷然舍皇漢醫學而轉向西洋醫學遂見舉世唱西洋醫學萬能之盛一面被棄如弊屣之漢方醫藥被殘存之少數漢方醫守護又為民間藥僅得維持其命脈至今明治維新後最近二三十年間日本科學之進步既雄就中我醫學方面之發達尤屬驚異的在世界文化史上異彩燦然此科學之進步研究熱之旺盛遂使究明之先鋒追及數千年來神祕之漢藥之上原來漢藥之起源甚古實在富有多數貴重之經驗然可惜缺實驗又應用單以傳説及經驗為基礎換言之即以一個信念傳來者也是以科學進步之今日古來傳統難以照樣認容在現今醫學之病理診斷以及分科之進步雖有足驚歎者若論治療法則與古來之漢方醫術無甚大差至少亦於內科方面往往見漢方的處置有優於彼者一面古方醫藥受現代醫學採用加味者漸多進而世間對漢方醫藥之信賴頓高研究愈旺各大學專門學校以及研究所之研究漢藥者近來頓增亦可見其間之消息也一面學界對漢方醫學之憧憬更烈敏於謀利之商人巧利用婦人雜志及新聞廣告以博巨利又市井之非醫者模塗懸招牌汲汲乎以漢藥為生理者不可勝數可見世相試觀近來揭載於醫學雜志之漢藥治驗例將軍味或古來湯頭原方試用於某種病例雖有效而誇大推獎之者多然此等對於藥材之藥性以及復合調劑之藥理既不辨明而又不洞察病狀病勢之所趨是以不能隨機應漢方之變以運其用藥之妙徒效古人之術或反一時難保無危險之事如此漢藥之用法是無異於現今庸醫不諳藥性藥理以單味藥劑盲目而進僅以加減用量對付病勢復雜變化也其知見之淺其術之不及遠甚令人可憾其實應用漢方之妙味在乎綜合處方之綜合藥理而且察其病狀之機微及病勢之歸趨期在適中無誤作此言之餘雖亦長年月沒頭於漢藥之研究但對藥材之性狀有多少之知見乎未稔者尚夥其配合之妙味亦未達熟知之域至其臨床應用上之加減察配全屬門外漢自以為憾也至今於日本研究漢方醫藥者雖日多前途尚遼遠若以總括而言之如前所述宜自古今藥品之異同性狀藥理之研究始及於此等配合之綜合藥理更進而臨床應用上之實驗與熟技今後更須許多之學理的精細研究與周到之實地試驗為要也入於現代醫學之漢藥數既不少其成分闡明藥理確立應用於臨床上而得良好結果者亦有若干又依此後之研究得轉化為新藥者亦不少至今之治療藥概自化學的純品成為合成藥品此法在現今非無多少窮乎其打開之法非欲再就和漢藥之天然物中探求新味乎漢藥之數及經驗豐富彼此後之研究如何應得發見許可移入於現代醫學而裨益於治療界者是以此方面之研究得貢獻於東洋文化開發上應不少也統觀現今日本之新藥界以和漢藥為原料之新藥者不少其中在治療界既占重要地位者有之此等自其內容觀之概可分為三種如次第一為和漢藥之藥化學研究之結果發見分離一種特殊有效成分又檢查其藥理學得證明確立其生理學的作用且應用之於臨床上得證明原料漢藥古來之治效或與此相關聊而案出別途治效步漢藥研究之正道可以看作希望之大半已達例如自麻黃分離為喘息及祛痰之藥又自防己發見以治神經痛僂麻質斯者是也其中於漢藥中發見與西洋醫學所用之某種化學的物質同種或類似之物質為代用治療藥而見用例如白桔梗遠志等發見質與根主成分之質同樣用此等為治療藥者是也又為治淋藥最見廣用之白檀油主成分同樣之或類自松檜之松柏科植物精油中發見之而用為治淋藥者亦其一例也又葉之有效成分乃屬配糖體此亦由和漢藥之福壽草萬年青鈴蘭等分離其強心性配糖體而代用之其中有既知之成分更受化學的或生物學處理誘導為更強力或臨床上更便宜之成分在藥化學上及藥理學上示極有興味之進步者有之例如自生樟制樟腦自樟腦通過動物體內誘導為即又自漢藥蟾酥蟆之脂分離更加入臭素則其強心作用可以增強數千倍實有津津興味者要之此部類者得以化學的闡明其成分以藥理學的確證其藥效根據偉然科學的基礎以供藥用者也第二為以前為民間藥或為漢方醫藥雖概認其有藥效而化學的或藥理學的尚未能十分闡明其成分藥理如海人草現之證據楸實者是也此等依今後之研究其成分藥理之明白時期諒亦不遠矣第三為既全無確實奏效之經驗而藥理學的又未得檢查或雖檢查亦不得證明其作用之民間藥乃以新藥之形式混帳宣傳大概將來無甚可期也幾多漢藥之中專以傳説為基礎而供藥用者不少又以多年衆人之經驗為根據者亦有之如今日之科學實驗的研究既旺由此等之中應得發見新成分或開拓新應用之途是以和漢藥研究之前途諒洋洋無限也殊如關於臨床應用上之實驗的研究大須勞煩多數臨床家之關心也漢藥之作用雖不若洋藥之強烈迅速出現若以合理的應用連用之當得良效而且不貽副作用之點似可多得滿足與賞讚者也其次且就此等漢藥之中用為一鎮痛二祛痰三尿防腐四驅蟲五強心等之目的之調製新藥之原料者略解説之且欲明其與新藥之關係也淺學菲才知余固非其任而且紙數及時間有限未能十分考證粗漏之處幸原諒焉一鎮痛藥為神經痛僂麻質斯之藥而廣見知者有自漢藥防己及延胡索調製之新藥防己乃屬防己科之植物延胡索則與罌粟白屈藥同屬罌粟科其含有成分主有起中樞神經系之鎮靜麻痹之作用故用為鎮痛之目的茲就防己及延胡索記述於次一防己防己乃載在神農本草經中品部之漢藥主産於中國南方用為藥之部分乃其根也此有漢防己及木防己二種起初以漢中産即今之陝西地方産者為良品而賞用之是謂之漢防己他處産者稱之曰木防己以別之然現今在漢藥市場之此區別頗難此等商品原植物之考證亦全不明瞭在日本之指為原植物者亦有種種異説一般以青防己充木防己以大防己充漢防己此外同為防己科之植物而供為藥用者有千金藤衡州烏藥山豆根等防己之有效成分及藥理學的作用起初研究者為醫學者江冢田口太田石割高圻等諸博士其後藥學之近藤教授及其門下生研究之不獨防己然又發見防己科植物中所含種種新結局由青防己確定及之又自大防己確定及之而分離青防己之全者為新藥又大防己之第一為新藥第二為新藥提供於現代治療界多數臨床家似頗愛用之關於防己之古記載則神農本草經有主風寒溫瘧熱氣諸癇除邪利大小便又別録曰療水腫風腫去膀胱熱傷寒寒熱邪氣中風手腳攣急止泄通散癰腫利惡結諸蝸疥癬蟲瘡通腠理利九竅云云其後通覽諸家所説謂防己自古對種種疾患尤以熱性諸病僂麻質斯循環障礙泌尿器病等為下劑鎮痛利尿瀉下等之目的而見用時或區別漢木防己而記其治效今自防己分離之尤以徵其藥理學的試驗之結果其作用有類規尼對神經中樞有鎮靜下熱之效又確有利尿消炎等之作用然則事實可謂對漢方醫法之防己之藥用下科學的之基礎一面臨床家經驗前記新藥事實大抵肯定無異議元來僂麻質斯神經痛之疾患其原因病狀概非單一故雖難以同一藥劑一概律之然宜以多數臨床家之陽性有效成績為滿足於此以其謂漢方不可侮寧須敬服古代醫聖之貴重之發見也余自數年來嘗由中國各地遠自廣東雲南方面搜集漢防己木防己之生藥十數種而實驗研究之究竟現今生藥市場之漢木兩防己之區別全不明瞭又就其中數種檢索其此等漢木防己中竟不能發見日本所指之青防己大防己之等之其中極少而且難度其種類者有之然於數種得證第一之此之乃近藤教授等自臺灣産日名原名中發見者據余教室之藥理學的試驗其作用酷似雖尚未經臨床上試驗其藥效諒與同樣可以期待也夫如是同為防己而中國防己與日本防己之所含有效成分不同恐原植物亦不同也此事實在他種漢藥亦常常發見是漢藥研究上須注意之事項也二延胡索延胡索乃罌粟科之植物採其塊莖為藥用自生於中國朝鮮日本歐洲各地其種類甚多原植物之日本産者謂之藪延胡索朝鮮産者謂之高麗延胡索延胡索即玄胡索為漢方藥局常備藥材之一宋開寶本草始有記載其言曰主破血産後諸病因血所為者婦人月經不調腹中結塊崩中淋露産後血暈暴血衝上因損下血或酒摩及煮服云又李時珍曰活血利氣止痛通小便更合本草綱目之發明附方等考之本品似曾見用於月經不調産後諸病諸血病以及種種疼痛例如頭痛月經痛腹痛等關於其化學的成分則在西洋有多數學者之研究發見約有十種之就中尤見重其藥理作用及臨床上之效果亦有報告據近年朝比奈教授研究朝鮮産之延朝索謂不含有而見證明種種而抽出此總製成之新藥為據伊藤博士之研究謂此有如嗎啡之中樞神經系之鎮靜作用及如古加因之局所麻醉作用其作用雖不甚強然富有持續性又臨床上之成績則用大量於腹痛疝痛等其作用固不若嗎啡之強然能阻止肺結核患者之咳嗽發作又用於種種神經痛效果顯著而且有持續性云此際可見古人之經驗善與今日之學理一致也二鎮咳祛痰藥制自漢藥之新藥中用為鎮咳祛痰者甚多如麻黃石蒜之以為主成分者有之然大抵含有配糖質尤含質如遠志桔梗車前八手竹節人參等種種而此等有者其溶血作用之強弱大概雖與毒性相比例其與祛痰作用之強弱之關係則不明然之祛痰作用概依局所刺戟作用為則一因口腔咽頭等之刺戟益其氣道之分泌且喚起咳嗽聲咳一面依胃黏膜之刺戟起噁心使氣道之分泌增大稀薄如是使容易祛出祛痰而致咳嗽鎮靜者乃藥理學所教也其局所作用強者祛痰作用亦強故噁心消化障礙等之副作用亦多視今日治療界之實狀以其謂效力強者寧以副作用少而且易服者多受歡迎然藥理作用既不明治效又模塗者有之而以宣傳之力竟見應用者有之凡祛痰藥一般以其用有效成分之純品寧用生藥為佳煎劑比錠劑為佳溫而服之為可是以漢方之用法頗合理的也三麻黃麻黃在歐洲印度亦有産出多野生於中國各地尤以內蒙古地方形如木賊原植物乃屬麻黃科之採莖為藥用自古記在神農本草經之中品為皇漢醫藥所重之漢藥之一自昔主用為發汗藥本經曰主中風傷寒頭痛溫瘧發表出汗去邪熱氣止咳逆上氣除寒熱破症堅積聚又張仲景傷寒論處方中之麻黃湯葛根湯及大小青龍湯等皆以麻黃為主劑今示其配劑如次麻黃湯麻黃二錢桂皮一錢三分甘草六分杏仁十個葛根湯葛根一錢半麻黃一錢桂皮甘草芍藥各七分半小青龍湯麻黃芍藥各二錢細辛乾薑甘草桂皮各一錢半五味子半夏各二錢大青龍湯麻黃五錢桂皮甘草各一錢半杏仁七個石膏三錢一錢即一兩也及新醫學時代之後日本猶以麻黃為發汗鎮咳祛痰之藥尤見重於喘息之處方一八八五年長井長義先生由此麻黃分離一種承高橋三浦兩先生及廣瀨博士等之藥理學的研究之後天津博士及余共同工作實驗藥物學的得證明為之代用臨床上有同樣之效果且拜託二三臨床家使用之竟無有顧之者當時萬事皆崇西洋之世亦不得已也其後約經十年有陳某在美國發表之論文自是以後頓惹世界注意日本臨床家亦附驥尾而用之實自長井先生髮見以來閲四十餘年之事也只今在治療界已成重要之藥品矣據其後之研究亦非只一種又可以合成製造之近來商人有輸入廉價之合成巧裝自家制品然後發售者如前所述麻黃之莖謂有發汗之效而其根則反有止汗之作用者往昔陶弘景亦有記載李時珍贊同之根用於盜汗虛汗前年餘在教室研究麻黃根之結果發見含有之莖有血壓上升作用其根則反有降下血壓之作用然其成分如何又與之關係如何則仍未解決古人已知莖與根之作用相反其發見亦奇有效於氣管枝喘息者乃及氏等所提倡其後經東西多數臨床家之實驗其作用雖屬一過性大多數確認有效力之作用雖不若彼之強烈由藥理推之應有約略同樣之效力其實凡可用者亦大抵可以應用之麻黃劑對氣管枝炎肺炎以及其他呼吸器疾患之帶咳嗽喀痰諸症之大有鎮咳祛痰之效者諒為有如次之藥理所致也即今若氣道有加答兒以及其他刺戟時則以反射的刺戟咳嗽中樞而發咳嗽咳嗽頻發則氣管枝黏膜面之蒸發旺盛痰愈濃厚自黏膜愈難離然能弛緩氣管枝筋去其痙攣一面起血壓上升血行旺盛同時增高氣管枝黏膜之分泌緩解其痰又使氣管枝筋之蠕動運動旺盛由是而得容易喀出其痰咳嗽自息而見症狀輕快元氣恢復此際以麻黃為茶劑之形式與多量之液體同飲之為有利雖少有如他種劑之消化障礙嘔心頭痛等之副作用若用過量則稍有上逆之概者又如喘息等之久時運用者因慣於藥性效力漸弱故宜但於發作時用之為佳現時在新藥界所宣傳之祛痰藥之中連有效成分與藥理全然不明者有之蓋麻黃劑之所以卓越於他種製劑者實在茲也以或麻黃為主成分之新藥有種種如次純鹽酸三共同同合成品桔梗麻黃製劑麻黃桔梗遠志製劑麻黃成分合製劑合製劑四遠志遠志之原植物乃屬遠志科之自生於山野其根為藥用自古似用為健腦強精之目的本草經曰主咳逆傷中補不足除邪氣利九竅益知慧耳目聰明不忘強志倍力久服輕身不老又別録曰利丈夫定心氣止驚悸益精去心下膈氣皮膚中熱面目黃好顏色延年在舊時代其葉亦為藥用別録曰主益精補陰氣止虛損夢泄遠志酒似亦被賞用葛洪之抱朴子曾記陵陽漢之縣名子仲二十年間連服遠志舉三十七子云遠志中所含之有效成分可以看作與根中之同一物藥理的作用亦與彼同足有祛痰藥之理現在日本藥局方亦採用之祛痰性新藥中亦配合之五桔梗桔梗乃屬桔梗科之植物自生於原野之多年草也在朝鮮有栽培之以供食用之地方用根為藥近時為根之代用品需要日增載在神農本草經之下品其為藥用之起源也甚古生藥呈淡黃色味苦其類白色者剝其外皮而曝之所謂曬桔梗者是也桔梗根主用為祛痰藥本草經曰主胸脅痛如刀刺腹滿腸鳴幽幽驚恐悸氣別録云利五臟腸胃補血氣除寒熱風痹溫中消穀療咽喉痛下蠱毒桔梗根之有效成分梅辻氏曾分離無晶形粗大名之曰桔梗又大鹿博士以別個方法制造粗大以為其分子式且檢其藥理作用其結果謂桔梗與質中最有強力溶血作用之比較之約有之強力作用又桔梗根之溶血作用約二倍於根其毒性則大略與同樣云又試之於臨床上得證明有優秀之祛痰作用在今日日本藥局方亦收載之又與他種祛痰藥配合而見用以桔梗根為主成分之新藥有數種如次桔梗根流動越幾斯製劑桔梗麻黃製劑桔梗製劑六車前車前乃自生於山野之多年草全草為車前草種子為車前子皆為藥用載在本經上品自古用之關於車前子之藥效本經曰主氣癃止痛止水道小便除濕痹久服輕身耐老別録云男子傷中女子淋瀝不欲食養肺強陰益精令人有子明目療赤痛即主用為利尿止瀉之藥又補強治眼疾有效云其草及根皆用為止血利尿眼藥消化藥車前之有效成分宿谷氏曾證明之配糖質緒方氏西氏等則於種子中證明多量黏液之外尚有酸琥珀酸等又高橋博士由全草中分離配糖體動物試驗之結果發表其大要如次即本物質能使呼吸運動深大緩慢大有鎮咳作用又能亢進分泌神經增進氣管及氣管枝之黏液消化液之分泌根據以上藥理以為鎮咳祛痰藥試之於臨床上認得成績良好以此漢藥為原料而制新藥者如次與他種性祛痰藥不同不障礙消化器是其特色云以車前配糖體為主成分含有車前子之非性有效成分七八角金盤八角金盤本非漢藥可謂日本之民間藥也葉為浴湯之料見用於僂麻質斯又崎玉縣有某地方碎其葉混灰以捕魚屬於五加科之常緑灌木也太田氏於慶應大學病理化學教室受田口教授指導之下由本植物葉中發見及之二種質且檢其生理的作用前者稀釋至一二四倍後者稀釋至四倍猶有完全之溶血作用而且前者之局所作用強若注射於家兔皮下則發赤次無菌性化膿組織壞死雖亦呈同樣之作用惟大弱耳制自本植物之藥而廣見知於治療界之新藥者有本製劑中含有強大祛痰作用之溶脂性及型之佐多博士曾將其毒性溶血作用等與他種性祛痰藥比較之據其試驗成績謂毒力少而溶血力強又應用於臨床上曾得好成績云其他之臨床試驗尚有多數醫家之報告八竹節人參又名土參乃自生於山林陰地之多年草也與朝鮮人參同屬五加科之植物然非同種採根為藥本非漢方藥然在民間自古用為祛痰藥者也據井上村山板垣氏等之研究其根中含有其溶血指數一八倍云以本為主成分之新藥為微甘之白色粉末無引濕性雖久藏亦不變質九石蒜石蒜至宋之圖經本草始有記載乃採收石蒜科之之鱗莖者也圖經本草在今日雖不傳證類本草之本經外草類曾引用石蒜故圖經本草諒亦別記於本經外也其解説曰水麻生鼎州味辛溫有小毒其根名石蒜主傅貼腫毒九月採之云云又李時珍亦記其主治曰疔瘡惡核可水煎服及搗傅之又中溪毒者酒煎半時服取吐良可見外用概以煎汁搗液傅貼腫毒用為消炎之目的又內服則諒以煎汁為催吐劑在日本俗間亦以催吐效力確實之毒草知名石蒜成分之科學的研究一八九五年森島教授曾以其蔥根試驗動物確認有催吐作用且分離二種之性有效成分是為嚆矢其後依諸家之研究該鱗莖中之及之化學的性狀亦明白又知道及之異性體觀其此等藥理學的試驗之結果之生理的作用類似而且其毒性比尤弱其催吐作用則比尤強其有數量對犬之體重每一瓩皮下注射則一五瓱內服則七瓱在此分量除嘔吐流涎之外不見著明之局所用是以石蒜之製劑為祛痰藥而見用之誘導體對赤痢原蟲之作用謂比尤強以鹽酸之液之新藥曰為赤痢及肺之治療藥聲價有漸高之概三尿防腐藥以前為尿防腐藥以治淋疾及尿路之細菌性炎症之洋藥為白檀油蓽澄茄之類其有效成分皆含有揮發油類或樹脂酸此若吸收而出於尿則能妨遏尿中細菌之發育抑制尿之分解又通過腎臟時能刺戟之以增大尿量如是尿路受多量防腐性尿之洗滌好影響於淋疾以及尿路疾患之治愈近來和漢藥之研究愈盛其中發見含有或之發揮性成分為白檀油之代替藥而見賞用於臨床上者有之而此等多得自樟科或松柏科植物者十樟樟乃自生於日本南方暖地之喬木尤以臺灣為世界的産地而有名將其木材切片以水蒸氣蒸溜之可得約之揮發油其為樟腦以供藥用又工業亦多用之採樟腦之餘為樟腦白油輕油及赤油白油乃於一七五二度分溜而成市上所售片腦油即此也以高溫二七三度分溜而成者為赤油含有等為治淋藥而見賞用製劑則有數種如次一主成分與白檀油同為少有障礙胃腸之治淋藥也聲價漸高二此亦與同樣之製品也十一杉杉乃自生於日本內地或栽植之常緑喬木也其葉中含有之精油主成分為等木部亦平均含之精油此主成分為新藥者乃將本植物之揮發油成分加入樹脂酸者也十二檜在神農本草經上品部記載者為柏屬扁柏科之植物也日本之檜近似於此白生於內地或栽植之常緑喬木也木部約含之精油主成分為又含樟腦及扁柏酸以本植物為原料之新藥有次記二種頗見知於斯界一由檜之木部所得之樹脂及精油為治淋藥廣見知收載於日本陸軍藥局方二由檜之根部所得之精油加樹脂者也為麻痹尿路之疼痛故混也四驅蛔藥驅蛔藥所珍重者為此乃花中所含之成分其原植物屬於菊科之産於土耳其斯坦之基爾宜仙湖畔余教室所藏漢藥中之屬於者有黃花蒿青蒿茵陳蒿菴䕡艾等然是等固不含又不得證明有顯然之驅蛔作用又年來搜集蒙古北滿地方所産之艾多種類而檢索竟不得發見之和漢藥中自古用為驅蟲之目的者不少就中最有名者為海人草以此為原料之製劑亦有種種其有效成分與效力則各有議論近來在余教室用種種漢藥試驗驅蟲之結果但見崖椒之精油對豚之蛔蟲有強烈之中毒作用現仍實驗不輟頗有興也茲就海人草及崖椒略述於次十三海人草海人草乃屬紅藻之海藻在日本主産於琉球及九州南部之海岸本草綱目以及其他本草書皆不見記載惟本草綱目拾遺之諸蔬部鷓鴣菜之處有漳州府志鷓鴣菜散碎花微黑出漳浦療小兒腹中積食之即下如神之文無古典而讀此記事可見為唯一地方之發見也又大和本草之鷓鴣菜條下曰閩書曰生海石上散碎色微黑小兒腹中有蟲病少食能愈在日本不但自往昔已為民間藥且曾用為醫藥而乃受西洋醫學所壓似不甚見用然一九四年日本田中氏煎海人草及旃那葉為驅蛔湯公表為有驅蟲作用以來惹起世間注意信其效力者漸多研究其有效成分者亦漸出至其有效成分之物質如何諸説不一有田中氏之慶松教授之黏液素武田博士之配糖體諏訪博士之等今日尚未見確認也於現今藥理學實驗尋常所行之驅蛔作用之動物試驗概不甚可恃即臨床上信為最有效力顯著之之作用在動物實驗亦不甚顯然是以其有效成分之判定頗難視種種海藻之試驗成績比海人草之作用更強者有之然或謂真正作用之本相非在海人草似為附著挾雜於海人草之他海藻類其真偽之判定當俟此後之研究也自海人草調製之新藥中如等者人所周知也其他雖有種種製品其為不能充分獨賴海人草之效力歟或欲期藥效完全歟致有配合他種驅蟲性藥物者茲記其主要製品及其主成分如次海人草全有效成分同上海人草越幾斯稠厚牛膽白桃花越幾斯海人草有效成分海人草有效成分十四崖椒李時珍之本草綱目載有山椒數種普通山椒乃自古為藥用之蜀椒即花椒也崖椒及宋之圖經本草始見記載之漢藥俗稱野椒者其氣不若山椒之香大和本草謂臭味不好不可食日譯本草似以充之在余教室所實驗者乃自生於滿洲山野之犬山椒此果為往昔之崖椒與否難以斷言也俗間對此謂之川椒然蜀椒亦有川椒之別名乃産自四川之良品之意為恐誤會本篇以滿洲之犬山椒為崖椒而述之在民間主用為料理之香料關於子實精油之化學的研究則本學豫科化學教室之佐藤氏曾由此精油分離一種結晶性成分確認為與同一物而非其後山下及佐藤氏等除去此結晶之殘部見有酷似之香氣實驗之結果確認為殆近純粹之又山下氏曾實驗此精油有強烈之殺蟲作用而薦之於余余檢其對豚之蛔蟲及蚯蚓之毒作用其強烈非海人草蛇床子等之比雖少弱於其強則近油然果適用於人體與否目下尚在試驗中須待此後成績之如何也為在實驗藥理學上有趣故記之耳五強心藥以前之強心藥為及之萬能時代最近對提供於治療之雖有議論之者然亦屬有興味之研究其實似有裨益於治療界者也以皇漢藥為原料之強心性新藥有以鈴蘭君影草之全配糖質製劑之萬年青配糖質製劑之等皆確認有強心利尿之效或注射處有多少刺戟作用致不甚見廣用歟福壽草側金盞花之歐洲産者為在西洋多用為丁幾劑産於亞細亞北部者多在黑龍江河邊有之名含有無晶形糖體雖有同名製品之記録現在市場不見焉余自年來曾數次實驗福壽草根其強心作用約當葉八分之一雖不若鈴蘭君影草之強然其作用極緩和數年前渡歐時曾見某處製藥公司正盛行研究將來或得裝而出現於治療界亦未可知十五蟾酥蟾酥似使蟆之皮腺分泌液吸收於麵粉而乾燥之者其製法祕而難知製品有扁平面包型大小二種薄煎餅型一種此三種之效力之差異則尚無實驗也此産自江蘇河南四川等為漢藥屬極重要之一有種種之作用效力亦強用途又廣在日本以此為原料之便藥年售數百萬元亦豪也彼中國有名之六神丸主成分亦屬此也六神丸之內容雖依製造處而有不同據雷氏法所載之處方則如次犀黃一錢半腰黃一錢珠粉一錢半元寸香一錢冰片一錢蟾酥一錢即配合牛黃麝香之高貴藥真正品應高價也又考其內容亦可見有治效蘇州誦芬堂乃二百餘年老鋪該藥房主人雷允上謹制之六神丸最可信用也蟾酥出在別録下品之藥陶弘景曰其皮汁甚有毒犬齧之口皆腫此毒即為蟾酥而蟾酥之名至寇宗奭之本草衍義始出焉其為藥用之起源似於唐時代也甄權之藥性論相傳為唐太宗當時之書其中有端午日取眉脂以硃砂麝香為丸如麻子大小孩子疳瘦者空心一丸腦疳以奶汁調滴鼻中一節可見用於小兒之驚癇其後再考究種種用途日華子本草則謂可治腎虛本草衍義謂塗於齒齦之出血則有隨手止血之效云其引用於綱目之記事者專屬外科方面認為瘍疽金疳齒痛等之妙藥傳之於日本香具師在大路以自己身體為實驗臺拔刀自刺而賣之藥者即此蟆之脂也關於蟆之皮腺分泌毒之有效成分之研究在西洋有氏等又蟾酥之有效成分之研究在日本則有清水兒玉博士等以藥理學的綜合此等考之蟾酥中所存在物質有四種如次一如樣之局所麻醉性物質二如樣之血管收縮性物質三如樣之強心性物質四如樣之中樞神經興奮性物質為有樣物質故貼於瘡瘍有鎮痛之效以其有樣物質故有止血之功可見古人用法全與今日之藥同一揆也以上有效成分之中至今最見研究者為強心性物質直接自蟆或蟾酥得分離成分如次即及氏等自歐洲産之蟆分離氏闡明乃因分解而生美國之及氏自美國産之蟆證明日本之清水兒玉兩博士自蟾酥證明近年小竹氏得一種短柱狀晶對附以之分子式諸家所得成績皆小異而不一定前年井上秀李氏在滿洲醫大研究蟾酥其後轉託東京帝大藥學科之近藤教授研究之近藤教授以化學的詳細綿密研究遂得闡明與之關係及此二者與分解産物之關係又小林芳人博士與近藤教授連絡檢查此等物質之藥理作用發見有興味之事實如次即使結合於之之強心作用比母體之實強數千倍以前對此為強心劑之適否雖有種種議論若此於臨床上確認有優秀之治療的療果則本物質當為新強心藥而跳舞於治療界實際的之價值雖非批評之時期其研究之進展展開之過程大有興味也第四章結論以上余於第一章略説漢藥之為何物第二章論中國各時代漢藥之發達與變遷兼述與此密接不可分之本草學之發達第三章解説日本新時代之漢藥尤以摘録新藥原料之和漢藥即略日本自輸入西洋醫學之後一時棄而不顧之漢藥依現代科學進步之風潮再受科學的吟味檢查其中之某種移入現代治療界而見使用之主要十數種者介紹之而自此漢藥研究調製之新藥中見重於今日之治療界者有之或謂要重漢藥之科學的研究已盡其餘不足取以吾人所見斯言未必當也蓋至今之漢藥研究猶屬序幕真正研究利用應期待於今而後凡分離一個有效成分以化學的藥理學的研究之臨床試驗之至少須數年工夫時或數十年其次檢討配合藥復合藥理至於臨床上可以安心使用又須幾多年月不若世人所想像之簡單也顧漢方醫術及漢方醫效之起源甚遠其流頗長欲研究之者不可性急也須要忍耐與努力若以古人處方例試用於一二病例便云其治效未免皮相淺薄實難認容者也我滿洲醫科大學為鑑於地理上及存立之特異性對漢方醫學及醫藥之研究常大注意努力蓋亦大學事業之一也然過去二十年間光陰概為準備即自中國北方遠至雲南四川以及南洋方面極力搜集研究材料所得生藥數實有二千餘種得世界屈指之大數年前曾刊行其目録和漢藥標本目録以頒同好以便於生藥之比較研究然其後隨時得搜集之標本亦不少此目録現正準備改版再刊又學內設有東亞醫學研究室舊名中國醫學研究室專搜集漢方醫學醫藥之古文獻努力研究之他處所難得之古典以及貴重文獻亦多一九三一年由滿大發行中國醫學書目約千餘頁大册應大有裨益於研究者又如前述本研究室之研究如漸進信必大有資於醫學之開拓也此漢藥標本也醫藥學書也皆為斯界貴重之研究材料公開於熱心研究家之前近來學外之研究者有不達千里自日本內地而來利用者漸多此等古文獻之搜集以前本學之太田正雄君及現任之黑田源次山下泰藏君等之努力頗多又漢藥標本之搜集古文獻之整理研究等有勞博士岡西為人君之努力亦極大此番余草此稿時亦多受岡西君助力不少於此並附謝意而擱筆
